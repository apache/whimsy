notifications:
  commits: commits@whimsical.apache.org
  issues: dev@whimsical.apache.org
  pullrequests: dev@whimsical.apache.org
  jobs: notifications@whimsical.apache.org
  jira_options: link label
github:
  description: "Apache Whimsy is a collection of useful organizational tools used by the ASF and Apache committers"
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
